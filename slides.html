<p>You already know OpenClaw basics. So we’ll skip setup and focus on internals.</p>

section th,

  background: #0b0b0b !important;

}

section pre {
  background: rgba(0, 0, 0, 0.58);

}

}

  width: 28%;
}

  width: 72%;

section th,

  background: #000000 !important;

  border: 1px solid #ffffff;

  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }

}

section.center {

}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);

  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);

  text-shadow: none;

  margin-top: 16px;
}

.two-col {

}

.highlight {

}

  opacity: 0.6;

<h2 id="the-gateway">The Gateway</h2>
<p><strong>WebSocket-based</strong> message broker + session manager</p>
<ul>
<li><strong>Channels</strong>: Telegram, Discord, WhatsApp, iMessage, Signal, Slack, Email...</li>
<li><strong>Sessions</strong>: per-user context, auth profiles, history</li>
<li><strong>Routing</strong>: deterministic binding rules → right message to right agent</li>
<li><strong>Heartbeats</strong>: scheduled pings to keep agents proactive</li>
</ul>

h1, h2, h3, h4, h5, h6, p, li, blockquote, th, td, a, strong, em {
  color: #ffffff;
}

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}

h1, h2, h3, h4, h5, h6, p, li, blockquote, th, td, a, strong, em {
  color: #ffffff;
}

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}

<p>One gateway → <strong>many agents</strong>, each isolated</p>

<li>Agents can have different models, personas, capabilities</li>

h1, h2, h3, h4, h5, h6, p, li, blockquote, th, td, a, strong, em {
  color: #ffffff;
}

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}

h1, h2, h3, h4, h5, h6, p, li, blockquote, th, td, a, strong, em {
  color: #ffffff;
}

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}

section th,

  text-shadow: none;
}

  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);

  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

section.center {

}

  display: inline-block;

.diagram {

  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;

.two-col {

.highlight {

}

  opacity: 0.6;
  margin-bottom: 8px;

<h2 id="cron--heartbeats">Cron &amp; Heartbeats</h2>
<p><strong>Proactive agents that don't wait to be asked</strong></p>
<ul>
<li><strong>Heartbeats</strong>: periodic pings → check email, calendar, alerts</li>
<li><strong>Cron</strong>: precise schedules → &quot;every Monday 9am, send standup&quot;</li>
<li><strong>Background work</strong>: commits, reports, monitoring while you sleep</li>
</ul>

h1, h2, h3, h4, h5, h6, p, li, blockquote, th, td, a, strong, em {
  color: #ffffff;
}

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}

<h2 id="agent-workspace-contract">Agent Workspace Contract</h2>
<p><strong>The files that define an agent</strong></p>
<table>
<thead>

<th>File</th>
<th>Purpose</th>
</tr>

<tbody>
<tr>

<tr>
<td><code>USER.md</code></td>

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}

<h2 id="the-tool-system">The Tool System</h2>
<p><strong>What agents can actually do</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Built-in tools
  read / write / edit / exec    ← filesystem &amp; shell
  browser                       ← full web automation
  canvas                        ← visual surfaces
  nodes                         ← paired mobile devices
  message                       ← send to channels
  image / tts                   ← media generation
  web_fetch                     ← lightweight web access

+ Skill tools (custom scripts via SKILL.md)
</code></pre>

h1, h2, h3, h4, h5, h6, p, li, blockquote, th, td, a, strong, em {
  color: #ffffff;
}

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}

<h2 id="memory-system">Memory System</h2>
<p><strong>How agents remember across sessions</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Short-term (session)          Long-term (files)
─────────────────────         ──────────────────
Context window                MEMORY.md

memory/2026-02-26.md            memory_search(&quot;what did we discuss&quot;)
  └── raw events               memory_get(&quot;user preferences&quot;)
</code></pre>
<ul>
<li><strong>No vector DB required</strong> — markdown + semantic search</li>

h1, h2, h3, h4, h5, h6, p, li, blockquote, th, td, a, strong, em {
  color: #ffffff;
}

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}

<h2 id="context-management">Context Management</h2>
<p><strong>Keeping the agent sharp over long sessions</strong></p>
<ul>
<li><strong>Compaction</strong>: summarize older context, preserve key facts</li>
<li><strong>Session pruning</strong>: drop irrelevant history, keep signal</li>
<li><strong>Context window budget</strong>: models vary — manage proactively</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Strategies:
  ✓ Load only relevant memory files per session type
  ✓ Use haiku for lightweight tasks (10x cheaper)
  ✓ Sub-agents for isolated work → don't bloat main context
  ✓ Heartbeat model: haiku | main chat: sonnet | deep work: opus
</code></pre>

h1, h2, h3, h4, h5, h6, p, li, blockquote, th, td, a, strong, em {
  color: #ffffff;
}

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}

h1, h2, h3, h4, h5, h6, p, li, blockquote, th, td, a, strong, em {
  color: #ffffff;
}

section table {
  display: table !important;
  width: 100% !important;
  table-layout: fixed;
  border-collapse: collapse;
  background: #000000 !important;
  border: 1px solid #ffffff;
  border-radius: 0;
  overflow: hidden;
  outline: none;
}

section table th:first-child,
section table td:first-child {
  width: 28%;
}

section table th:nth-child(2),
section table td:nth-child(2) {
  width: 72%;
}

section th,
section td {
  background: #000000 !important;
  color: #ffffff !important;
  border: 1px solid #ffffff;
  padding: 10px 12px;
  text-align: left;
  text-shadow: none;
}

section th {
  background: #0b0b0b !important;
  font-weight: 700;
}

section pre {
  background: rgba(0, 0, 0, 0.58);
  color: #f4f7ff;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 12px;
  padding: 16px 18px;
  text-shadow: none;
}

section pre code {
  background: transparent;
  color: inherit;
}

h1 { font-size: 42px; }
h2 { font-size: 32px; }
li { margin-bottom: 8px; }

.title-slide h1 {
  font-size: 56px;
  margin-bottom: 12px;
}

section.center {
  text-align: center;
}

.tag {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  padding: 2px 12px;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.diagram {
  font-family: monospace;
  background: rgba(0,0,0,0.45);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 18px;
  text-shadow: none;
  line-height: 1.8;
  margin-top: 16px;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

.highlight {
  color: #f9c74f;
  text-shadow: 0 0 12px rgba(249,199,79,0.4);
}

.section-label {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 8px;
}
